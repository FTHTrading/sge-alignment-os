name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd packages/db && npx prisma generate

      - name: Remove dynamic API routes (incompatible with static export)
        run: |
          rm -rf apps/web/src/app/api/auth
          rm -rf apps/web/src/app/api/governance/\[id\]
          rm -rf apps/web/src/app/api/milestones/\[id\]
          rm -rf apps/web/src/app/api/partners/\[id\]
          rm -rf apps/web/src/app/api/projects/\[id\]

      - name: Build static site
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_DEMO_MODE: "true"
          NEXTAUTH_SECRET: "gh-pages-build-placeholder"
        run: cd apps/web && pnpm next build

      - name: Add .nojekyll
        run: touch apps/web/out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
